services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=1
      - AllowedOrigins=http://localhost:3000,http://localhost:8080
      - FrontendAppUrl=${FRONTEND_APP_URL:-http://localhost:8080}
      - ExcelImportRoot=/app/import
      - SeedUsers__Admin__Username=${SEED_ADMIN_USERNAME:-admin}
      - SeedUsers__Admin__Password=${SEED_ADMIN_PASSWORD:-Admin!Sotero2026Map}
      - SeedUsers__Viewer__Username=${SEED_VIEWER_USERNAME:-viewer}
      - SeedUsers__Viewer__Password=${SEED_VIEWER_PASSWORD:-Viewer!Sotero2026Map}
    volumes:
      - ./:/app
      - sqlite_data:/app/data
      - nuget_cache:/root/.nuget/packages
      - ${FRONTEND_DATA_HOST_PATH:-./frontend-data}:/app/frontend-data:ro
      - ${IMPORT_HOST_PATH:-./import}:/app/import:ro
    restart: unless-stopped

volumes:
  sqlite_data:
  nuget_cache:


